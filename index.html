<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>查經筆記</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
    const USER = "anpingch-git"; 
    const REPO = "bible";
    const ROOT = "archive";

    async function loadArchive() {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = ''; 

        // 1. 抓取第一層：新/舊約
        const resT = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${ROOT}`);
        const testaments = await resT.json();

        for (let t of testaments) {
            if (t.type === "dir") {
                // 顯示「舊約」或「新約」大標題
                gallery.innerHTML += `<div class="col-span-full mt-16 text-4xl font-black text-[#f9d21b] border-b-2 border-[#f9d21b] pb-2 uppercase">${t.name}</div>`;

                // 2. 抓取第二層：卷名
                const resB = await fetch(t.url);
                const books = await resB.json();

                for (let b of books) {
                    if (b.type === "dir") {
                        // 顯示「卷名」中標題
                        gallery.innerHTML += `<div class="col-span-full mt-8 mb-4 text-2xl font-bold text-gray-400 pl-4 border-l-4 border-gray-600">${b.name}</div>`;

                        // 3. 抓取第三層：HTML 檔案
                        const resF = await fetch(b.url);
                        const files = await resF.json();
                        // ... 此處接續產生卡片的 HTML ...
                    }
                }
            }
        }
    }
    loadArchive();
</script> 
  
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s; }
        .glass-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.1); border-color: #c38d05; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-5xl font-bold text-center mb-12 text-[#f9d21b]">查經筆記</h1>
        <div id="file-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </div>

    <script>
        const repo = "anpingch-git/bible"; // 您的帳號與儲存庫
        const folder = "archive";

        async function fetchFiles() {
            const response = await fetch(`https://api.github.com/repos/${repo}/contents/${folder}`);
            const files = await response.json();
            const listElement = document.getElementById('file-list');

            // 依據檔名排序（最新日期在前）
            files.reverse().forEach(file => {
                if (file.name.endsWith('.html')) {
                    // 解析檔名：2026-04-13_經文_標題.html
                    const parts = file.name.replace('.html', '').split('_');
                    const date = parts[0] || "";
                    const chapter = parts[1] || "";
                    const title = parts[2] || file.name;

                    const card = `
                        <a href="${file.path}" class="glass-card p-8 rounded-3xl block">
                            <span class="text-[#c38d05] text-xs font-bold tracking-widest uppercase">${date} | ${chapter}</span>
                            <h2 class="text-2xl font-bold mt-2 text-white">${title}</h2>
                            <div class="mt-6 text-[#f9d21b] font-bold">點擊進入查經內容 →</div>
                        </a>
                    `;
                    listElement.innerHTML += card;
                }
            });
        }
        fetchFiles();
    </script>
</body>
</html>
