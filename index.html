<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研經釋義查經資料</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e5e7eb; font-family: sans-serif; }
        .gold-glow { box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="text-center">
        <h1 class="text-4xl font-bold mb-12 text-transparent bg-clip-text bg-gradient-to-r from-yellow-500 to-yellow-200 tracking-widest">研經釋義數位圖書館</h1>
        
        <div class="flex flex-col md:flex-row gap-10 justify-center items-center">
            <a href="old_testament.html" class="group relative w-72 h-96 overflow-hidden rounded-2xl border border-yellow-900/50 gold-glow transition-all duration-500 hover:scale-105">
                <img src="https://images.unsplash.com/photo-1504052434139-a13094bee3bb" class="w-full h-full object-cover opacity-40 transition-transform duration-700 group-hover:scale-110">
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="text-yellow-500 text-sm tracking-[0.3em] mb-2 uppercase">Old Testament</span>
                    <h2 class="text-4xl font-bold text-white tracking-widest">舊約全書</h2>
                </div>
            </a>

            <a href="new_testament.html" class="group relative w-72 h-96 overflow-hidden rounded-2xl border border-yellow-900/50 gold-glow transition-all duration-500 hover:scale-105">
                <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80" class="w-full h-full object-cover opacity-40 transition-transform duration-700 group-hover:scale-110">
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="text-yellow-500 text-sm tracking-[0.3em] mb-2 uppercase">New Testament</span>
                    <h2 class="text-4xl font-bold text-white tracking-widest">新約全書</h2>
                </div>
            </a>
        </div>
        <p class="mt-12 text-gray-500 text-sm tracking-widest italic">「草必枯乾，花必凋殘，惟有我們神的話必永遠立定。」</p>
    </div>
</body>
</html>
