<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的每日研經筆記</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; font-family: sans-serif; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .glass-card:hover { 
            transform: scale(1.03); 
            background: rgba(255, 255, 255, 0.08); 
            border-color: #f9d21b; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-16">
            <h1 class="text-5xl font-black tracking-tighter text-[#f9d21b] mb-4 uppercase">Bible Study Notes</h1>
            <p class="text-gray-500 uppercase tracking-widest text-sm">自動化索引系統 v2.0</p>
        </header>
        
        <div id="gallery" class="space-y-16">
            <div class="text-center py-20 text-gray-600 animate-pulse">正在搜尋各卷筆記...</div>
        </div>
    </div>

    <script>
        const USER = "anpingch-git"; // 您的 GitHub 帳號 [cite: 224, 267]
        const REPO = "bible";        // 您的儲存庫名稱 [cite: 224, 267]
        const ROOT = "archive";      // 檔案存放的根目錄 [cite: 224, 233]

        async function fetchContent(url) {
            const res = await fetch(url);
            return res.json();
        }

        async function loadArchive() {
            try {
                const gallery = document.getElementById('gallery');
                // 1. 抓取第一層：新約 / 舊約 
                const testaments = await fetchContent(`https://api.github.com/repos/${USER}/${REPO}/contents/${ROOT}`);
                gallery.innerHTML = ''; 

                for (let t of testaments) {
                    if (t.type === "dir") {
                        // 顯示「舊約」或「新約」大標題 
                        const tSection = document.createElement('div');
                        tSection.innerHTML = `<h2 class="text-4xl font-black text-[#f9d21b] border-b-2 border-[#f9d21b] pb-2 mb-8 uppercase">${t.name}</h2>`;
                        gallery.appendChild(tSection);

                        // 2. 抓取第二層：各卷聖經 (如：出埃及記) 
                        const books = await fetchContent(t.url);
                        for (let b of books) {
                            if (b.type === "dir") {
                                const bSection = document.createElement('div');
                                bSection.className = "mb-12";
                                bSection.innerHTML = `<h3 class="text-2xl font-bold text-gray-400 pl-4 border-l-4 border-gray-600 mb-6">${b.name}</h3>`;
                                
                                const grid = document.createElement('div');
                                grid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8";
                                
                                // 3. 抓取第三層：該卷內的 HTML 檔案 
                                const files = await fetchContent(b.url);
                                files.filter(f => f.name.endsWith('.html')).reverse().forEach(file => {
                                    const fileName = file.name.replace('.html', '');
                                    const parts = fileName.split('_');
                                    const date = parts[0] || "";
                                    const chapter = parts[1] || "";
                                    const title = parts[2] || fileName;

                                    grid.innerHTML += `
                                        <a href="${file.path}" class="glass-card rounded-3xl p-8 flex flex-col justify-between h-64">
                                            <div>
                                                <div class="flex justify-between items-start mb-4">
                                                    <span class="bg-[#f9d21b]/20 text-[#f9d21b] text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-widest">${chapter}</span>
                                                    <span class="text-gray-600 text-[10px] font-mono">${date}</span>
                                                </div>
                                                <h2 class="text-2xl font-bold leading-tight text-white transition-colors line-clamp-2">${title}</h2>
                                            </div>
                                            <div class="flex items-center text-[#f9d21b] text-sm font-bold mt-4">
                                                點擊進入查經內容 <span class="ml-2">→</span>
                                            </div>
                                        </a>`;
                                });
                                bSection.appendChild(grid);
                                tSection.appendChild(bSection);
                            }
                        }
                    }
                }
            } catch (e) {
                console.error("載入失敗", e);
                document.getElementById('gallery').innerHTML = '<div class="text-center text-red-500">無法載入筆記，請確認 archive 資料夾結構。</div>';
            }
        }
        loadArchive();
    </script>
</body>
</html>
