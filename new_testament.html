<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>新約全書 - 研經筆記</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #fff; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-12 border-b border-yellow-900/30 pb-6">
            <h1 class="text-3xl font-bold text-yellow-500 tracking-widest">新約全書</h1>
            <a href="index.html" class="text-gray-400 hover:text-white transition-colors">← 返回首頁</a>
        </header>
        
        <div id="gallery" class="space-y-16">
            <div class="text-center text-gray-500 animate-pulse">正在開啟圖書館卷軸...</div>
        </div>
    </div>

    <script>
        const USER = "anpingch-git"; 
        const REPO = "bible";        
        const BASE_PATH = 'archive/新約';

        async function loadOldTestament() {
            try {
                // 1. 獲取新約下的經卷清單
                const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${BASE_PATH}`);
                const books = await response.json();
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = '';

                for (const book of books) {
                    if (book.type === 'dir') {
                        // 2. 獲取各卷下的檔案
                        const resFiles = await fetch(book.url);
                        const files = await resFiles.json();
                        
                        const section = document.createElement('section');
                        section.innerHTML = `
                            <h2 class="text-xl font-bold text-yellow-600/80 mb-6 border-l-4 border-yellow-600 pl-4">${book.name}</h2>
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                ${files.filter(f => f.name.endsWith('.html')).map(f => createCard(f, book.name)).join('')}
                            </div>
                        `;
                        gallery.appendChild(section);
                    }
                }
            } catch (e) {
                document.getElementById('gallery').innerHTML = "載入失敗，請檢查網路或 GitHub 設定。";
            }
        }

        function createCard(file, bookName) {
            // 解析檔名：日期_章節_主題.html
            const parts = file.name.replace('.html', '').split('_');
            const date = parts[0] || '未知日期';
            const chapter = parts[1] || bookName;
            const title = parts[2] || '精彩分享';
            
            return `
                <a href="${file.path}" class="glass block rounded-xl overflow-hidden border border-white/10 hover:border-yellow-500/50 transition-all duration-300">
                    <div class="p-5">
                        <div class="text-yellow-500 text-xs tracking-tighter mb-2">${date}</div>
                        <div class="text-white font-bold mb-1 truncate">${chapter}</div>
                        <div class="text-gray-400 text-sm line-clamp-2">${title}</div>
                    </div>
                </a>
            `;
        }

        loadOldTestament();
    </script>
</body>
</html>
