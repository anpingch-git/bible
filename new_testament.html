<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舊約研經資料</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #fff; margin: 0; }
        .fixed-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-image: linear-gradient(to bottom, rgba(5,5,5,0.3) 0%, rgba(5,5,5,0.95) 100%), 
                              url('https://opal.google/board/blobs/5f164fa8-4a33-4bcc-a0e6-5a83233b0e50');
            background-size: cover; background-position: center; background-repeat: no-repeat;
        }
        .gold-gradient {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="fixed-background"></div>
    <div class="relative z-10">
        <div class="w-full h-[50vh] flex flex-col justify-end p-8 md:p-20">
            <a href="index.html" class="absolute top-10 left-10 text-xl text-white/70 hover:text-white glass-card px-6 py-3 rounded-full">← 返回首頁</a>
            <h1 class="text-7xl md:text-9xl font-black gold-gradient tracking-tighter mb-4 drop-shadow-2xl">新約全書</h1>
            <p class="text-2xl md:text-3xl text-white/80 italic tracking-widest">「惟有神的話必永遠立定」</p>
        </div>

        <main class="max-w-7xl mx-auto px-8 pb-32">
            <div id="gallery" class="space-y-24">
                <div id="loading" class="text-center py-20 text-3xl text-gray-500 animate-pulse">正在翻開聖經卷軸...</div>
            </div>
        </main>
    </div>

    <script>
        const OWNER = 'anpingch-git'; 
        const REPO = 'bible';
        const BASE_PATH = 'archive/新約';

        async function loadBooks() {
            try {
                const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${BASE_PATH}`);
                const books = await response.json();
                document.getElementById('loading').remove();

                for (const book of books) {
                    if (book.type === 'dir') {
                        const resFiles = await fetch(book.url);
                        const files = await resFiles.json();
                        // 排序：新日期在前
                        const htmlFiles = files.filter(f => f.name.endsWith('.html'))
                                               .sort((a, b) => b.name.localeCompare(a.name));

                        if (htmlFiles.length > 0) renderSection(book.name, htmlFiles);
                    }
                }
            } catch (e) { console.error(e); }
        }

        function renderSection(name, files) {
            const gallery = document.getElementById('gallery');
            const section = document.createElement('section');
            section.innerHTML = `
                <h2 class="text-4xl font-bold text-yellow-500 mb-10 border-l-8 border-yellow-500 pl-6">${name}</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    ${files.map(f => createCard(f)).join('')}
                </div>
            `;
            gallery.appendChild(section);
        }

        function createCard(f) {
            // 假設檔名格式：日期_章節_主題.html
            const parts = f.name.replace('.html', '').split('_');
            const date = parts[0] || '';
            const chapter = parts[1] || '';
            const title = parts[2] || '查看內容';

            return `
                 <a href="${f.path}" class="glass-card group block p-8 rounded-3xl hover:border-yellow-500 transition-all">
                    <div class="relative z-10">
                       <div class="text-yellow-500/60 text-xs font-mono mb-4 uppercase tracking-widest">${date}</div>
                
                       <div class="text-3xl md:text-4xl font-black text-white mb-3 group-hover:text-yellow-400 transition-colors leading-tight">
                          ${title}
                       </div>
                
                      <div class="text-lg text-gray-400 font-medium tracking-wide">
                        ${chapter}
                      </div>
                    </div>
                </a>
            `;
        }
        loadBooks();
    </script>
</body>
</html>
