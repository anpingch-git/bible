<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新約研經釋查經</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 基礎設定 */
        body { 
            background-color: #050505; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* 核心修改：全螢幕固定背景層 */
        .fixed-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* 放在所有內容最後方 */
            background-image: linear-gradient(to bottom, rgba(5,5,5,0.4) 0%, rgba(5,5,5,0.95) 100%), 
                              url('img src="https://opal.google/board/blobs/5f164fa8-4a33-4bcc-a0e6-5a83233b0e50');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 內容包裹層：設為透明以便看見背景 */
        .content-wrapper {
            position: relative;
            z-index: 1;
            background: transparent;
        }

        /* 金色漸層標題 */
        .gold-gradient {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 毛玻璃效果卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: rgba(212, 175, 55, 0.5);
            background: rgba(212, 175, 55, 0.08);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        /* 隱藏捲動軸但保持功能 (可選) */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.3); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="fixed-background"></div>

    <div class="content-wrapper">
        
        <div class="w-full h-[45vh] md:h-[55vh] flex flex-col justify-end p-8 md:p-20 relative">
            <div class="absolute top-8 left-8">
                <a href="index.html" class="glass-card px-5 py-2 rounded-full text-sm font-medium text-white/80 hover:text-white inline-flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    返回首頁
                </a>
            </div>
            
            <div class="max-w-4xl">
                <span class="text-yellow-500 text-sm tracking-[0.4em] font-light uppercase opacity-90 block mb-3">The Old Testament</span>
                <h1 class="text-6xl md:text-7xl font-black gold-gradient tracking-widest mb-4">新約全書</h1>
                <p class="text-white/70 text-lg md:text-xl italic font-light leading-relaxed">
                    「草必枯乾，花必凋殘，惟有我們神的話必永遠立定。」
                </p>
            </div>
        </div>

        <main class="max-w-7xl mx-auto px-8 pb-32">
            <div id="gallery" class="space-y-20">
                <div id="loading" class="flex flex-col items-center justify-center py-20 space-y-4">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-yellow-500"></div>
                    <div class="text-gray-400 text-lg tracking-widest animate-pulse">正在開啟聖經卷軸...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 設定區 ---
        const OWNER = 'anpingch-git'; 
        const REPO = 'bible';
        const BASE_PATH = 'archive/新約'; // 🔴 確保資料夾名稱完全正確

        async function loadBooks() {
            const gallery = document.getElementById('gallery');
            try {
                // 1. 獲取新約下的資料夾清單
                const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${BASE_PATH}`);
                if (!response.ok) throw new Error("API Path Error");
                const books = await response.json();
                
                document.getElementById('loading').remove();

                // 2. 遍歷每個經卷資料夾
                for (const book of books) {
                    if (book.type === 'dir') {
                        const resFiles = await fetch(book.url);
                        const files = await resFiles.json();
                        // 修改後的代碼：過濾後立即按檔名日期排序
                           const htmlFiles = files
                           .filter(f => f.name.endsWith('.html'))
                           .sort((a, b) => {
                               // 假設檔名格式為 "20240327_經卷_主題.html"
                               // localeCompare 配合 'reverse' 效果，讓大的日期（新）排在前面
                               return b.name.localeCompare(a.name);
                            });

                        if (htmlFiles.length > 0) {
                            renderBookSection(book.name, htmlFiles);
                        }
                    }
                }
            } catch (e) {
                gallery.innerHTML = `
                    <div class="text-center p-20 glass-card rounded-3xl">
                        <p class="text-red-400 text-xl tracking-widest">載入失敗</p>
                        <p class="text-gray-500 mt-2 text-sm text-balance">請確認 GitHub 上的路徑是否為: ${BASE_PATH}</p>
                    </div>`;
            }
        }

        function renderBookSection(bookName, files) {
            const gallery = document.getElementById('gallery');
            const section = document.createElement('section');
            
            section.innerHTML = `
                <div class="flex items-center gap-4 mb-8">
                    <h2 class="text-2xl font-bold text-yellow-500/90 tracking-widest">${bookName}</h2>
                    <div class="h-[1px] flex-grow bg-gradient-to-r from-yellow-500/30 to-transparent"></div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    ${files.map(f => createCard(f, bookName)).join('')}
                </div>
            `;
            gallery.appendChild(section);
        }

        function createCard(file, bookName) {
            // 解析檔名：日期_經文_主題.html (依據您的 GAS 設定)
            const parts = file.name.replace('.html', '').split('_');
            const date = parts[0] || '';
            const chapter = parts[1] || bookName;
            const title = parts[2] || '閱讀筆記';

            return `
                <a href="${file.path}" class="glass-card group block rounded-2xl p-6 relative overflow-hidden">
                    <div class="relative z-10">
                        <div class="text-yellow-500/60 text-[10px] font-mono tracking-widest mb-3 uppercase">${date}</div>
                        <div class="text-white font-bold text-lg mb-2 group-hover:text-yellow-400 transition-colors">${chapter}</div>
                        <div class="text-gray-400 text-sm line-clamp-2 leading-relaxed font-light">${title}</div>
                    </div>
                </a>
            `;
        }

        // 啟動載入
        loadBooks();
    </script>
</body>
</html>
