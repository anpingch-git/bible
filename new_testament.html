<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新約研經資料 - 數位圖書館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #fff; font-family: system-ui, -apple-system, sans-serif; margin: 0; }
        .fixed-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
            background-image: linear-gradient(to bottom, rgba(5,5,5,0.4) 0%, rgba(5,5,5,0.95) 100%), 
                              url('https://opal.google/board/blobs/5f164fa8-4a33-4bcc-a0e6-5a83233b0e50');
            background-size: cover; background-position: center; background-repeat: no-repeat;
        }
        .gold-gradient {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease;
        }
        .glass-card:hover { border-color: rgba(212, 175, 55, 0.4); transform: translateY(-4px); }
        .btn-download { font-size: 10px; padding: 4px 10px; border-radius: 4px; transition: all 0.2s; font-weight: bold; }
    </style>
</head>
<body>

    <div class="fixed-background"></div>

    <div class="relative z-10">
        <div class="w-full h-[40vh] flex flex-col justify-end p-8 md:p-20">
            <a href="index.html" class="mb-10 w-fit glass-card px-5 py-2 rounded-full text-sm font-medium text-white/80 hover:text-white inline-flex items-center gap-2">
                ← 返回首頁
            </a>
            <div class="max-w-4xl">
                <h1 class="text-6xl md:text-8xl font-black gold-gradient tracking-widest mb-4">新約全書</h1>
                <p class="text-white/70 text-xl italic font-light">「草必枯乾，花必凋殘，惟有我們神的話必永遠立定。」</p>
            </div>
        </div>

        <main class="max-w-7xl mx-auto px-8 pb-32">
            <div id="gallery" class="space-y-20">
                <div id="loading" class="text-center py-20 text-gray-400 animate-pulse">正在開啟研經卷軸...</div>
            </div>
        </main>
    </div>

    <script>
        const OWNER = 'anpingch-git'; 
        const REPO = 'bible';   
        const BASE_PATH = 'archive/新約'; 

        async function loadNewTestament() {
            const gallery = document.getElementById('gallery');
            try {
                const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${BASE_PATH}`);
                if (!response.ok) throw new Error();
                const folders = await response.json();
                document.getElementById('loading').remove();
                for (const folder of folders) {
                    if (folder.type === 'dir') {
                        const resFiles = await fetch(folder.url);
                        const files = await resFiles.json();
                        const htmlFiles = files.filter(f => f.name.endsWith('.html')).sort((a, b) => b.name.localeCompare(a.name));
                        if (htmlFiles.length > 0) renderSection(folder.name, htmlFiles);
                    }
                }
            } catch (e) {
                gallery.innerHTML = `<div class="text-center p-20 glass-card rounded-3xl text-red-400">載入失敗。</div>`;
            }
        }

        function renderSection(bookName, files) {
            const gallery = document.getElementById('gallery');
            const section = document.createElement('section');
            section.innerHTML = `
                <div class="flex items-center gap-4 mb-8">
                    <h2 class="text-3xl font-bold text-yellow-500/90">${bookName}</h2>
                    <div class="h-[1px] flex-grow bg-gradient-to-r from-yellow-500/30 to-transparent"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    ${files.map(f => createCard(f, bookName)).join('')}
                </div>
            `;
            gallery.appendChild(section);
        }

        function createCard(file, bookName) {
            const fullFileName = file.name.replace('.html', '');
            const parts = fullFileName.split('_');
            const date = parts[0] || "";
            const chapter = (parts[1] || bookName).replace(/-/g, ':');
            let title = (parts[2] || "閱讀分享").replace(/-/g, ' ');
            const docId = parts.slice(3).join('_');

            let downloadSection = "";
            if (docId && docId !== "NoDoc" && docId.length > 20) {
                downloadSection = `
                    <div class="flex gap-2 mt-5 pt-4 border-t border-white/10">
                        <a href="https://docs.google.com/document/d/${docId}/export?format=docx" class="btn-download bg-blue-600/20 text-blue-300 hover:bg-blue-600 hover:text-white border border-blue-500/30">Word</a>
                        <a href="https://docs.google.com/document/d/${docId}/export?format=pdf" class="btn-download bg-red-600/20 text-red-300 hover:bg-red-600 hover:text-white border border-red-500/30">PDF</a>
                    </div>
                `;
            }

            return `
                <div class="glass-card group rounded-2xl p-8 flex flex-col justify-between">
                    <a href="${file.path}" class="block">
                        <div class="text-yellow-600/50 text-xs font-mono mb-4">${date}</div>
                        <h3 class="text-2xl font-black text-orange-50/90 mb-3 group-hover:text-yellow-400 transition-colors leading-tight">${title}</h3>
                        <p class="text-lg text-gray-400/70 font-medium">${chapter}</p>
                    </a>
                    ${downloadSection}
                </div>
            `;
        }
        loadNewTestament();
    </script>
</body>
</html>
