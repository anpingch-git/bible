<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>舊約全書 - 數位圖書館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #050505; color: #fff; }</style>
</head>
<body class="p-8">
    <header class="flex justify-between mb-8 border-b border-yellow-900/30 pb-4">
        <h1 class="text-3xl font-bold text-yellow-500">📜 舊約全書</h1>
        <a href="index.html" class="text-gray-400 hover:text-white">← 返回首頁</a>
    </header>
    <div id="gallery" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div id="loading" class="text-gray-500">正在翻開舊約卷軸...</div>
    </div>

    <script>
        // ⚠️ 請修改以下三個參數
        const USER = "anpingch-git"; 
        const REPO = "bible";
        const BASE_PATH = 'archive/舊約'; // 指定只抓取「舊約」資料夾 

        async function loadBooks() {
            const gallery = document.getElementById('gallery');
            try {
                const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${BASE_PATH}`);
                if (!response.ok) throw new Error();
                const books = await response.json();
                
                document.getElementById('loading').remove();
                for (const book of books) {
                    if (book.type === 'dir') {
                        // 抓取各卷下的檔案
                        const resFiles = await fetch(book.url);
                        const files = await resFiles.json();
                        renderBookSection(book.name, files);
                    }
                }
            } catch (e) {
                gallery.innerHTML = "❌ 載入失敗：請確認 archive/舊約/ 資料夾是否存在，且 OWNER/REPO 設定正確。";
            }
        }

        function renderBookSection(name, files) {
            const container = document.getElementById('gallery');
            const htmlFiles = files.filter(f => f.name.endsWith('.html'));
            htmlFiles.forEach(file => {
                const card = document.createElement('a');
                card.href = file.path;
                card.className = "p-4 border border-white/10 rounded-xl bg-white/5 hover:border-yellow-500/50 block";
                card.innerHTML = `<h3 class="text-yellow-500 font-bold">${name}</h3><p class="text-sm text-gray-400">${file.name.replace('.html','')}</p>`;
                container.appendChild(card);
            });
        }
        loadBooks();
    </script>
</body>
</html>
