<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>舊約全書 - 研經筆記</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-12 border-b border-yellow-900/30 pb-6">
            <h1 class="text-3xl font-bold text-yellow-500 tracking-widest">📜 舊約全書</h1>
            <a href="index.html" class="text-gray-400 hover:text-white transition-colors">← 返回首頁</a>
        </header>
        
        <div id="gallery" class="space-y-16">
            <div id="loading" class="text-center text-gray-500 animate-pulse text-xl">正在翻開舊約卷軸...</div>
        </div>
    </div>

    <script>
        // ⚠️ 請務必檢查這三個變數是否與您的 GitHub 一致
        const OWNER = 'anpingch-git'; 
        const REPO = 'bible';
        const BASE_PATH = 'archive/舊約'; // 確保資料夾名稱正確（包含繁簡體）

        async function loadOldTestament() {
            const gallery = document.getElementById('gallery');
            try {
                // 1. 獲取「舊約」資料夾下的所有「經卷」子資料夾
                const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${BASE_PATH}`);
                if (!response.ok) throw new Error("路徑不存在");
                const books = await response.json();
                
                document.getElementById('loading')?.remove();

                for (const book of books) {
                    if (book.type === 'dir') {
                        // 2. 進入每一卷（如：出埃及記）獲取裡面的 .html 檔案
                        const resFiles = await fetch(book.url);
                        const files = await resFiles.json();
                        const htmlFiles = files.filter(f => f.name.endsWith('.html'));

                        if (htmlFiles.length > 0) {
                            renderSection(book.name, htmlFiles);
                        }
                    }
                }
            } catch (e) {
                gallery.innerHTML = `<div class="text-red-500 text-center p-10 glass rounded-xl">載入失敗：請確認 GitHub 上是否存在 ${BASE_PATH} 資料夾。</div>`;
            }
        }

        function renderSection(bookName, files) {
            const gallery = document.getElementById('gallery');
            const section = document.createElement('section');
            
            section.innerHTML = `
                <h2 class="text-xl font-bold text-yellow-600 mb-6 border-l-4 border-yellow-600 pl-4 tracking-widest">${bookName}</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    ${files.map(f => createCard(f, bookName)).join('')}
                </div>
            `;
            gallery.appendChild(section);
        }

        function createCard(file, bookName) {
            // 解析檔名格式：日期_經文_主題.html
            const nameParts = file.name.replace('.html', '').split('_');
            const date = nameParts[0] || '';
            const chapter = nameParts[1] || bookName;
            const title = nameParts[2] || '查看內容';

            return `
                <a href="${file.path}" class="glass block rounded-xl overflow-hidden hover:border-yellow-500/50 transition-all duration-300 group">
                    <div class="p-5">
                        <div class="text-yellow-500 text-xs mb-2 opacity-70">${date}</div>
                        <div class="text-white font-bold mb-1 truncate group-hover:text-yellow-400">${chapter}</div>
                        <div class="text-gray-400 text-sm line-clamp-2">${title}</div>
                    </div>
                </a>
            `;
        }

        loadOldTestament();
    </script>
</body>
</html>
