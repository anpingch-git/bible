<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舊約研經資料 - 數位圖書館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 基礎設定 */
        body { 
            background-color: #050505; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* 核心效果：全螢幕固定背景層 */
        .fixed-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; 
            background-image: linear-gradient(to bottom, rgba(5,5,5,0.4) 0%, rgba(5,5,5,0.95) 100%), 
                              url('https://opal.google/board/blobs/94a41ff0-2e03-482b-9d8b-3041e6384364');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 內容包裹層 */
        .content-wrapper {
            position: relative;
            z-index: 1;
            background: transparent;
        }

        /* 金色漸層大標題 */
        .gold-gradient {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 毛玻璃科技感卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: rgba(212, 175, 55, 0.4);
            background: rgba(212, 175, 55, 0.08);
            transform: translateY(-4px);
        }

        /* 下載按鈕樣式 */
        .btn-download {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 自訂捲動軸 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.3); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="fixed-background"></div>

    <div class="content-wrapper">
        
        <div class="w-full h-[45vh] md:h-[55vh] flex flex-col justify-end p-8 md:p-20 relative">
            <div class="absolute top-8 left-8">
                <a href="index.html" class="glass-card px-5 py-2 rounded-full text-sm font-medium text-white/80 hover:text-white inline-flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    返回圖書館首頁
                </a>
            </div>
            
            <div class="max-w-4xl">
                <span class="text-yellow-500 text-sm tracking-[0.4em] font-light uppercase opacity-90 block mb-3">The Old Testament</span>
                <h1 class="text-6xl md:text-8xl font-black gold-gradient tracking-widest mb-4 drop-shadow-2xl">舊約全書</h1>
                <p class="text-white/70 text-xl md:text-2xl italic font-light leading-relaxed">
                    「草必枯乾，花必凋殘，惟有我們神的話必永遠立定。」
                </p>
            </div>
        </div>

        <main class="max-w-7xl mx-auto px-8 pb-32">
            <div id="gallery" class="space-y-24">
                <div id="loading" class="flex flex-col items-center justify-center py-20 space-y-4">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-yellow-500"></div>
                    <div class="text-gray-400 text-lg tracking-widest animate-pulse">正在開啟研經卷軸...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // === 🔴 請在此更換您的帳號資訊 ===
        const OWNER = 'anpingch-git'; 
        const REPO = 'bible';   
        const BASE_PATH = 'archive/舊約'; 

        async function loadOldTestament() {
            const gallery = document.getElementById('gallery');
            try {
                // 1. 抓取舊約下的經卷資料夾
                const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${BASE_PATH}`);
                if (!response.ok) throw new Error();
                const folders = await response.json();
                
                document.getElementById('loading').remove();

                for (const folder of folders) {
                    if (folder.type === 'dir') {
                        // 2. 抓取卷內檔案
                        const resFiles = await fetch(folder.url);
                        const files = await resFiles.json();
                        
                        // 3. 排序：新日期在前 (降冪排序)
                        const htmlFiles = files
                            .filter(f => f.name.endsWith('.html'))
                            .sort((a, b) => b.name.localeCompare(a.name));

                        if (htmlFiles.length > 0) {
                            renderSection(folder.name, htmlFiles);
                        }
                    }
                }
            } catch (e) {
                gallery.innerHTML = `<div class="text-center p-20 glass-card rounded-3xl"><p class="text-red-400 text-xl">載入失敗，請確認 GitHub 設定。</p></div>`;
            }
        }

        function renderSection(bookName, files) {
            const gallery = document.getElementById('gallery');
            const section = document.createElement('section');
            
            section.innerHTML = `
                <div class="flex items-center gap-4 mb-10">
                    <h2 class="text-3xl font-bold text-yellow-500/90 tracking-widest">${bookName}</h2>
                    <div class="h-[1px] flex-grow bg-gradient-to-r from-yellow-500/30 to-transparent"></div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                    ${files.map(f => createCard(f, bookName)).join('')}
                </div>
            `;
            gallery.appendChild(section);
        }

        function createCard(file, bookName) {
    const fullFileName = file.name.replace('.html', '');
    // 使用底線拆分
    const parts = fullFileName.split('_');
    
    // 1. 取得 ID (最後一段)
    const docId = parts.length >= 4 ? parts[parts.length - 1] : "NoDoc";
    
    // 2. 取得標題 (倒數第二段)
    const title = parts.length >= 3 ? parts[parts.length - 2] : "閱讀分享";
    
    // 3. 取得章節 (倒數第三段)
    const chapter = parts.length >= 2 ? parts[parts.length - 3] : bookName;
    
    // 4. 取得日期 (第一段)
    const date = parts[0] || "";

    let downloadSection = "";
    if (docId && docId !== "NoDoc" && docId.length > 20) { // 增加 ID 長度檢查防呆
        downloadSection = `
            <div class="flex gap-2 mt-5 pt-4 border-t border-white/10">
                <a href="https://docs.google.com/document/d/${docId}/export?format=docx" class="btn-download bg-blue-600/20 text-blue-300 hover:bg-blue-600 hover:text-white border border-blue-500/30">WORD 下載</a>
                <a href="https://docs.google.com/document/d/${docId}/export?format=pdf" class="btn-download bg-red-600/20 text-red-300 hover:bg-red-600 hover:text-white border border-red-500/30">PDF 下載</a>
            </div>
        `;
    }

    return `
        <div class="glass-card group rounded-2xl p-8 flex flex-col justify-between">
            <a href="${file.path}" class="block">
                <div class="text-yellow-600/50 text-xs font-mono tracking-[0.2em] mb-4 uppercase">${date}</div>
                <h3 class="text-3xl font-black text-orange-50/90 mb-3 group-hover:text-yellow-400 transition-colors leading-tight tracking-tight">
                    ${title}
                </h3>
                <p class="text-lg text-gray-400/70 font-medium tracking-wide">
                    ${chapter}
                </p>
            </a>
            ${downloadSection}
        </div>
    `;
}

        // 啟動加載
        loadOldTestament();
    </script>
</body>
</html>
