<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舊約全書 - 數位圖書館</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        /* 修改後的 CSS 區塊 */
    .banner-bg {
    background-image: linear-gradient(to bottom, rgba(5,5,5,0.2) 0%, rgba(5,5,5,1) 100%), 
                      url('https://opal.google/board/blobs/94a41ff0-2e03-482b-9d8b-3041e6384364');
    background-size: cover;
    background-position: center;
    /* 核心語法：固定背景不隨捲軸移動 */
    background-attachment: fixed; 
    /* 確保在不同瀏覽器下的相容性 */
    background-repeat: no-repeat;
    }
           .gold-gradient {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF8C00 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.06); transition: all 0.3s ease;
        }
        .glass-card:hover { border-color: rgba(255, 215, 0, 0.3); background: rgba(255, 215, 0, 0.05); }
    </style>
</head>
<body class="p-0 m-0">
    <div class="w-full h-[40vh] md:h-[50vh] banner-bg flex flex-col justify-end p-8 md:p-16 relative">
        <div class="absolute top-6 left-6 z-20">
            <a href="index.html" class="text-white/70 hover:text-white glass-card px-4 py-2 rounded-full text-sm">← 返回首頁</a>
        </div>
        <div class="z-10 relative">
            <span class="text-yellow-500 text-sm tracking-[0.3em] font-light uppercase opacity-80">The Old Testament</span>
            <h1 class="text-5xl md:text-6xl font-extrabold gold-gradient tracking-widest mt-2 mb-2">舊約全書</h1>
            <p class="text-white/60 text-base md:text-lg max-w-xl italic">「惟有神的話必永遠立定」</p>
        </div>
    </div>

    <div class="max-w-7xl mx-auto p-8 pb-16">
        <div id="gallery" class="space-y-16">
            <div id="loading" class="text-center text-gray-500 animate-pulse text-xl py-20">正在翻開舊約卷軸...</div>
        </div>
    </div>

    <script>
        // ⚠️ 請務必檢查這三個變數是否與您的 GitHub 一致
        const OWNER = 'anpingch-git'; 
        const REPO = 'bible';
        const BASE_PATH = 'archive/舊約'; // 確保資料夾名稱正確（包含繁簡體）

        async function loadOldTestament() {
            const gallery = document.getElementById('gallery');
            try {
                // 1. 獲取「舊約」下所有經卷資料夾
                const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${BASE_PATH}`);
                if (!response.ok) throw new Error();
                const books = await response.json();
                
                document.getElementById('loading')?.remove();

                for (const book of books) {
                    if (book.type === 'dir') {
                        // 2. 進入每一卷獲取 .html 檔案
                        const resFiles = await fetch(book.url);
                        const files = await resFiles.json();
                        const htmlFiles = files.filter(f => f.name.endsWith('.html'));

                        if (htmlFiles.length > 0) {
                            renderSection(book.name, htmlFiles);
                        }
                    }
                }
            } catch (e) {
                gallery.innerHTML = `<div class="text-red-500 text-center p-10 glass-card rounded-xl">載入失敗：請確認 GitHub 上是否存在 ${BASE_PATH} 資料夾。</div>`;
            }
        }

        function renderSection(bookName, files) {
            const gallery = document.getElementById('gallery');
            const section = document.createElement('section');
            
            section.innerHTML = `
                <h2 class="text-2xl font-bold text-yellow-600/90 mb-8 border-l-4 border-yellow-600 pl-4tracking-wider">${bookName}</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    ${files.map(f => createCard(f, bookName)).join('')}
                </div>
            `;
            gallery.appendChild(section);
        }

        function createCard(file, bookName) {
            // 解析檔名：日期_經文_主題.html
            const nameParts = file.name.replace('.html', '').split('_');
            const date = nameParts[0] || '';
            const chapter = nameParts[1] || bookName;
            const title = nameParts[2] || '查看內容';

            return `
                <a href="${file.path}" class="glass-card block rounded-xl overflow-hidden group">
                    <div class="p-6">
                        <div class="text-yellow-500/70 text-xs mb-3 font-mono tracking-wider">${date}</div>
                        <div class="text-white font-bold mb-1 truncate group-hover:text-yellow-400 text-base">${chapter}</div>
                        <div class="text-gray-400 text-sm line-clamp-2">${title}</div>
                    </div>
                </a>
            `;
        }
        loadOldTestament();
    </script>
</body>
</html>
